name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install native-host dependencies
        run: npm install
        working-directory: native-host

      - name: Read version from manifest
        id: version
        shell: pwsh
        run: |
          $v = (Get-Content manifest.json | ConvertFrom-Json).version
          echo "VERSION=$v" >> $env:GITHUB_OUTPUT

      - name: Download official signed Node.js binary
        shell: pwsh
        run: |
          $nodeUrl = "https://nodejs.org/dist/v22.15.0/win-x64/node.exe"
          Invoke-WebRequest -Uri $nodeUrl -OutFile native-host\node.exe -UseBasicParsing
          $sig = Get-AuthenticodeSignature native-host\node.exe
          Write-Host "Signature: $($sig.Status) - $($sig.SignerCertificate.Subject)"

      - name: Stage release files
        shell: pwsh
        run: |
          $out = "release-stage"
          New-Item $out -ItemType Directory -Force | Out-Null

          # Extension files
          Copy-Item manifest.json, README.md, install.ps1, install.bat $out
          Copy-Item src $out\src -Recurse
          Copy-Item icons $out\icons -Recurse
          Copy-Item scripts $out\scripts -Recurse

          # Native host (node.exe + source + node_modules)
          $nh = "$out\native-host"
          New-Item $nh -ItemType Directory -Force | Out-Null
          Copy-Item native-host\node.exe $nh
          Copy-Item native-host\host.js $nh
          Copy-Item native-host\package.json $nh
          Copy-Item native-host\run-host.cmd $nh
          Copy-Item native-host\install.bat $nh
          Copy-Item native-host\native-manifest.json $nh
          Copy-Item native-host\node_modules $nh\node_modules -Recurse

      - name: Create zip
        shell: pwsh
        run: |
          $name = "DynamicsAudioCompanion-v${{ steps.version.outputs.VERSION }}"
          Compress-Archive -Path release-stage\* -DestinationPath "$name.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Dynamics Audio Companion v${{ steps.version.outputs.VERSION }}
          body: |
            ## Installation

            1. Download **DynamicsAudioCompanion-v${{ steps.version.outputs.VERSION }}.zip** below
            2. Extract the zip to a permanent folder (e.g. `C:\DynamicsAudioCompanion`)
            3. Run `install.ps1` (right-click → Run with PowerShell)
            4. Follow the on-screen instructions

            No Node.js required.
          files: |
            DynamicsAudioCompanion-v${{ steps.version.outputs.VERSION }}.zip
